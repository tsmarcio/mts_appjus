<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2800" viewBox="0 0 1800 2800">
    <title>Jurex — Design System</title>
    <defs>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.12"/>
      </filter>
      <style>
        .title { font: 700 44px Inter, Arial, sans-serif; fill:#111827; }
        .subtitle { font: 500 22px Inter, Arial, sans-serif; fill:#4B5563; }
        .h1 { font: 700 30px Inter, Arial, sans-serif; fill:#111827; }
        .h2 { font: 700 22px Inter, Arial, sans-serif; fill:#111827; }
        .body { font: 400 17px Inter, Arial, sans-serif; fill:#374151; }
        .small { font: 400 14px Inter, Arial, sans-serif; fill:#6B7280; }
        .label { font: 600 14px Inter, Arial, sans-serif; fill:#065F46; }
      </style>
    </defs>
    <rect width="100%" height="100%" fill="#F8FAFC"/>
    
<text x="80" y="95" class="title">JUREX — Design System</text>
<text x="80" y="135" class="subtitle">Fundação visual para criar Variables, Styles e Components no Figma</text>
<text x="80" y="210" class="h1">Cores</text>
<g><rect x="80" y="250" width="190" height="120" rx="16" fill="#123A24" stroke="#D1D5DB"/><text x="80" y="400" class="body">Green 900</text><text x="80" y="426" class="small">#123A24</text></g>
